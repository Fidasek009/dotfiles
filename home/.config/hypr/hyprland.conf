# This config is a STUB! This should never be generated.
# Use the default lua config from https://github.com/hyprwm/Hyprland/blob/main/example/hyprland.lua



$mainMod = SUPER
$terminal = kitty
$fileManager = dolphin
$menu = fuzzel
$browser = gtk-launch app.zen_browser.zen

env = LANG,en_US.UTF-8
env = LANGUAGE,en_US:en
env = LC_CTYPE,en_US.UTF-8
env = LC_NUMERIC,en_US.UTF-8
env = LC_TIME,en_US.UTF-8
env = LC_COLLATE,en_US.UTF-8
env = LC_MONETARY,en_US.UTF-8
env = LC_MESSAGES,en_US.UTF-8
env = LC_PAPER,en_US.UTF-8
env = LC_NAME,en_US.UTF-8
env = LC_ADDRESS,en_US.UTF-8
env = LC_TELEPHONE,en_US.UTF-8
env = LC_MEASUREMENT,en_US.UTF-8
env = LC_IDENTIFICATION,en_US.UTF-8
env = GTK_THEME,Adwaita:dark
env = XDG_DATA_DIRS,/home/fida/.local/share/flatpak/exports/share:/var/lib/flatpak/exports/share:/usr/local/share:/usr/share

source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/function-keys.conf

exec-once = command -v hyprpaper >/dev/null 2>&1 && { pgrep -x hyprpaper >/dev/null || hyprpaper; }
exec-once = clipboard-watch
exec = pgrep -x waybar >/dev/null || waybar

input {
	kb_layout = cz,us
	kb_variant =
	kb_model =
	kb_options =
	kb_rules =

	touchpad {
		natural_scroll = true
	}
}

bind = $mainMod, T, exec, $terminal
bind = $mainMod, W, exec, $browser
bind = $mainMod, R, exec, $menu
bind = $mainMod, Q, killactive,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, F, fullscreen,
bind = $mainMod, V, exec, clipboard-history
bind = , PRINT, exec, screenshot annotate
bind = $mainMod, PRINT, exec, screenshot copy-region
bind = $mainMod SHIFT, PRINT, exec, screenshot copy-screen
bind = $mainMod, SPACE, togglefloating,
bind = $mainMod, L, exec, hyprlock
bind = $mainMod SHIFT, E, exec, hyprctl dispatch exit
bind = $mainMod SHIFT, SPACE, exec, hyprctl switchxkblayout all next

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Bind by physical keycode so the Czech number row still switches workspaces.
bind = $mainMod, code:10, workspace, 1
bind = $mainMod, code:11, workspace, 2
bind = $mainMod, code:12, workspace, 3
bind = $mainMod, code:13, workspace, 4
bind = $mainMod, code:14, workspace, 5
bind = $mainMod, code:15, workspace, 6
bind = $mainMod, code:16, workspace, 7
bind = $mainMod, code:17, workspace, 8
bind = $mainMod, code:18, workspace, 9
bind = $mainMod, code:19, workspace, 10

bind = $mainMod SHIFT, code:10, movetoworkspace, 1
bind = $mainMod SHIFT, code:11, movetoworkspace, 2
bind = $mainMod SHIFT, code:12, movetoworkspace, 3
bind = $mainMod SHIFT, code:13, movetoworkspace, 4
bind = $mainMod SHIFT, code:14, movetoworkspace, 5
bind = $mainMod SHIFT, code:15, movetoworkspace, 6
bind = $mainMod SHIFT, code:16, movetoworkspace, 7
bind = $mainMod SHIFT, code:17, movetoworkspace, 8
bind = $mainMod SHIFT, code:18, movetoworkspace, 9
bind = $mainMod SHIFT, code:19, movetoworkspace, 10
