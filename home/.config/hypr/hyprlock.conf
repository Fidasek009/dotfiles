general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 0
}

background {
    monitor =
    color = rgba(0d1117ff)
}

label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    color = rgba(f0f6fcff)
    font_size = 72
    font_family = sans
    position = 0, 120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    color = rgba(8b949eff)
    font_size = 18
    font_family = sans
    position = 0, 52
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 320, 56
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.20
    dots_center = true
    outer_color = rgba(30363dff)
    inner_color = rgba(161b22ff)
    font_color = rgba(f0f6fcff)
    fail_color = rgba(f85149ff)
    check_color = rgba(58a6ffff)
    capslock_color = rgba(d29922ff)
    placeholder_text = Password
    fail_text = Authentication failed
    fade_on_empty = false
    position = 0, -70
    halign = center
    valign = center
}
